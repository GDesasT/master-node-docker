services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: api-dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - FRONTEND_URL=http://localhost:5173
    restart: unless-stopped
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - PORT=5173
      - VITE_API_URL=http://localhost:3000/api/v1
    restart: unless-stopped
